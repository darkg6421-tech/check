<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CipherVault · Zero-Knowledge Password Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #e2e8f0;
            padding: 16px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .lock-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #94a3b8;
        }
        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.4);
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, textarea {
            width: 100%;
            padding: 14px 16px;
            background: #0f172a;
            border: 1.5px solid #334155;
            border-radius: 14px;
            color: #f1f5f9;
            font-size: 16px;
            transition: all 0.2s;
        }
        input:focus, textarea:focus {
            border-color: #38bdf8;
            outline: none;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        .btn {
            background: linear-gradient(135deg, #38bdf8, #3b82f6);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #475569;
            color: #cbd5e1;
        }
        .btn-outline:hover {
            background: #1e293b;
        }
        .password-item {
            background: #0f172a;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 10px;
            border-left: 4px solid #38bdf8;
        }
        .password-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .password-detail {
            font-size: 13px;
            color: #94a3b8;
            display: flex;
            gap: 16px;
        }
        .strength-meter {
            height: 6px;
            background: #334155;
            border-radius: 10px;
            margin-top: 8px;
        }
        .strength-fill {
            height: 6px;
            border-radius: 10px;
            width: 0%;
            background: #ef4444;
        }
        .strength-fill.weak { width: 25%; background: #ef4444; }
        .strength-fill.medium { width: 50%; background: #f59e0b; }
        .strength-fill.strong { width: 75%; background: #10b981; }
        .strength-fill.very-strong { width: 100%; background: #38bdf8; }
        .flex-row {
            display: flex;
            gap: 10px;
        }
        .copy-btn {
            background: #334155;
            border: none;
            color: #cbd5e1;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🔐 CipherVault</div>
            <div class="lock-status" id="lockStatus">
                <span>🔒</span> Locked
            </div>
        </div>

        <!-- Unlock Section -->
        <div id="unlockSection" class="card">
            <h2 style="margin-bottom: 20px; font-weight: 500;">Unlock Vault</h2>
            <div class="input-group">
                <label>Master Password</label>
                <input type="password" id="masterPassword" placeholder="Enter your master password" autocomplete="off">
            </div>
            <button class="btn" id="unlockBtn">Unlock Vault</button>
            <p style="margin-top: 16px; font-size: 13px; color: #94a3b8; text-align: center;">
                Your master password never leaves this device. We use PBKDF2 (600k iterations) + AES-256-GCM.
            </p>
        </div>

        <!-- Vault Section (Hidden initially) -->
        <div id="vaultSection" style="display: none;">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="font-weight: 500;">Your Passwords</h2>
                    <button class="copy-btn" id="lockNowBtn">Lock Now</button>
                </div>
                
                <div id="passwordList"></div>
                
                <button class="btn btn-outline" id="addNewBtn" style="margin-top: 16px;">+ Add New Password</button>
            </div>

            <!-- Add/Edit Form (Hidden) -->
            <div id="addEditSection" style="display: none;" class="card">
                <h3 id="formTitle" style="margin-bottom: 20px;">Add New Entry</h3>
                <input type="hidden" id="editIndex" value="-1">
                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="entryTitle" placeholder="e.g., Gmail, Facebook">
                </div>
                <div class="input-group">
                    <label>Username / Email</label>
                    <input type="text" id="entryUsername" placeholder="user@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="flex-row">
                        <input type="text" id="entryPassword" placeholder="Password" style="flex:1;">
                        <button class="copy-btn" id="generatePwBtn" style="white-space: nowrap;">Generate</button>
                    </div>
                    <div class="strength-meter"><div class="strength-fill" id="strengthBar"></div></div>
                </div>
                <div class="input-group">
                    <label>Notes (Optional)</label>
                    <textarea id="entryNotes" rows="2" placeholder="Additional notes..."></textarea>
                </div>
                <div class="flex-row">
                    <button class="btn" id="saveEntryBtn">Save</button>
                    <button class="btn btn-outline" id="cancelEntryBtn">Cancel</button>
                </div>
            </div>

            <!-- Export/Import -->
            <div class="card">
                <div class="flex-row">
                    <button class="btn btn-outline" id="exportBtn">Export Encrypted Backup</button>
                    <button class="btn btn-outline" id="importBtn">Import</button>
                </div>
                <input type="file" id="importFile" accept=".json" style="display:none;">
            </div>
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            // ==================== CRYPTO CONFIG ====================
            const PBKDF2_ITERATIONS = 600000;
            const SALT_LENGTH = 16;
            const IV_LENGTH = 12;
            
            // Global state
            let masterKey = null;           // CryptoKey
            let vaultData = [];              // Decrypted entries
            let storageSalt = null;
            let isUnlocked = false;

            // DOM Elements
            const unlockSection = document.getElementById('unlockSection');
            const vaultSection = document.getElementById('vaultSection');
            const addEditSection = document.getElementById('addEditSection');
            const lockStatus = document.getElementById('lockStatus');
            const passwordList = document.getElementById('passwordList');
            
            // ==================== UTILITIES ====================
            function arrayBufferToBase64(buffer) {
                return btoa(String.fromCharCode(...new Uint8Array(buffer)));
            }

            function base64ToArrayBuffer(base64) {
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                return bytes.buffer;
            }

            async function deriveKey(password, salt) {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey(
                    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
                );
                return crypto.subtle.deriveKey(
                    { name: 'PBKDF2', salt: salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
                    keyMaterial,
                    { name: 'AES-GCM', length: 256 },
                    false,
                    ['encrypt', 'decrypt']
                );
            }

            // ==================== ENCRYPT/DECRYPT ====================
            async function encryptData(data, key) {
                const iv = crypto.getRandomValues(new Uint8Array(IV_LENGTH));
                const enc = new TextEncoder();
                const ciphertext = await crypto.subtle.encrypt(
                    { name: 'AES-GCM', iv: iv },
                    key,
                    enc.encode(JSON.stringify(data))
                );
                return {
                    iv: arrayBufferToBase64(iv),
                    data: arrayBufferToBase64(ciphertext)
                };
            }

            async function decryptData(encryptedObj, key) {
                const iv = base64ToArrayBuffer(encryptedObj.iv);
                const ciphertext = base64ToArrayBuffer(encryptedObj.data);
                const decrypted = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: new Uint8Array(iv) },
                    key,
                    ciphertext
                );
                const dec = new TextDecoder();
                return JSON.parse(dec.decode(decrypted));
            }

            // ==================== STORAGE ====================
            function saveToStorage(encryptedVault) {
                localStorage.setItem('ciphervault_salt', arrayBufferToBase64(storageSalt));
                localStorage.setItem('ciphervault_data', JSON.stringify(encryptedVault));
            }

            function loadFromStorage() {
                const saltB64 = localStorage.getItem('ciphervault_salt');
                const vaultStr = localStorage.getItem('ciphervault_data');
                if (!saltB64 || !vaultStr) return null;
                storageSalt = base64ToArrayBuffer(saltB64);
                return JSON.parse(vaultStr);
            }

            // ==================== INIT / UNLOCK ====================
            async function initializeVault(password) {
                storageSalt = crypto.getRandomValues(new Uint8Array(SALT_LENGTH));
                masterKey = await deriveKey(password, storageSalt);
                vaultData = [];
                const encrypted = await encryptData(vaultData, masterKey);
                saveToStorage(encrypted);
            }

            async function unlockVault(password) {
                const stored = loadFromStorage();
                if (!stored) return false;
                try {
                    const key = await deriveKey(password, storageSalt);
                    const decrypted = await decryptData(stored, key);
                    masterKey = key;
                    vaultData = decrypted;
                    return true;
                } catch (e) {
                    return false;
                }
            }

            async function lockVault() {
                masterKey = null;
                vaultData = [];
                isUnlocked = false;
                unlockSection.style.display = 'block';
                vaultSection.style.display = 'none';
                addEditSection.style.display = 'none';
                lockStatus.innerHTML = '<span>🔒</span> Locked';
                document.getElementById('masterPassword').value = '';
            }

            // ==================== UI RENDERING ====================
            function renderPasswordList() {
                if (vaultData.length === 0) {
                    passwordList.innerHTML = '<p style="color:#94a3b8; text-align:center; padding:20px;">No passwords saved yet.</p>';
                    return;
                }
                let html = '';
                vaultData.forEach((entry, idx) => {
                    html += `<div class="password-item">
                        <div class="password-title">${escapeHtml(entry.title) || 'Untitled'}</div>
                        <div class="password-detail">
                            <span>👤 ${escapeHtml(entry.username) || '—'}</span>
                            <span>🔑 ••••••••</span>
                        </div>
                        <div style="margin-top:12px; display:flex; gap:8px;">
                            <button class="copy-btn" data-action="copy" data-index="${idx}">Copy Password</button>
                            <button class="copy-btn" data-action="edit" data-index="${idx}">Edit</button>
                            <button class="copy-btn" data-action="delete" data-index="${idx}" style="background:#7f1d1d;">Delete</button>
                        </div>
                    </div>`;
                });
                passwordList.innerHTML = html;
                
                document.querySelectorAll('[data-action]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = parseInt(e.target.dataset.index);
                        const action = e.target.dataset.action;
                        if (action === 'copy') copyToClipboard(vaultData[idx].password);
                        else if (action === 'edit') editEntry(idx);
                        else if (action === 'delete') deleteEntry(idx);
                    });
                });
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            async function copyToClipboard(text) {
                await navigator.clipboard.writeText(text);
                alert('Password copied to clipboard');
            }

            // ==================== ENTRY MANAGEMENT ====================
            function showAddForm() {
                document.getElementById('formTitle').textContent = 'Add New Entry';
                document.getElementById('editIndex').value = '-1';
                document.getElementById('entryTitle').value = '';
                document.getElementById('entryUsername').value = '';
                document.getElementById('entryPassword').value = '';
                document.getElementById('entryNotes').value = '';
                addEditSection.style.display = 'block';
            }

            function editEntry(idx) {
                const entry = vaultData[idx];
                document.getElementById('formTitle').textContent = 'Edit Entry';
                document.getElementById('editIndex').value = idx;
                document.getElementById('entryTitle').value = entry.title || '';
                document.getElementById('entryUsername').value = entry.username || '';
                document.getElementById('entryPassword').value = entry.password || '';
                document.getElementById('entryNotes').value = entry.notes || '';
                addEditSection.style.display = 'block';
                updateStrengthMeter(entry.password);
            }

            async function deleteEntry(idx) {
                if (confirm('Delete this entry?')) {
                    vaultData.splice(idx, 1);
                    await saveVault();
                    renderPasswordList();
                }
            }

            async function saveVault() {
                const encrypted = await encryptData(vaultData, masterKey);
                saveToStorage(encrypted);
            }

            async function saveEntry() {
                const idx = document.getElementById('editIndex').value;
                const entry = {
                    title: document.getElementById('entryTitle').value,
                    username: document.getElementById('entryUsername').value,
                    password: document.getElementById('entryPassword').value,
                    notes: document.getElementById('entryNotes').value
                };
                if (idx === '-1') vaultData.push(entry);
                else vaultData[idx] = entry;
                await saveVault();
                addEditSection.style.display = 'none';
                renderPasswordList();
            }

            // Password Generator
            function generatePassword() {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?';
                let pwd = '';
                for (let i = 0; i < 20; i++) pwd += chars[Math.floor(Math.random() * chars.length)];
                document.getElementById('entryPassword').value = pwd;
                updateStrengthMeter(pwd);
            }

            function updateStrengthMeter(pwd) {
                const bar = document.getElementById('strengthBar');
                bar.className = 'strength-fill';
                if (!pwd) { bar.style.width = '0%'; return; }
                let score = 0;
                if (pwd.length >= 12) score += 2; else if (pwd.length >= 8) score += 1;
                if (/[a-z]/.test(pwd)) score++;
                if (/[A-Z]/.test(pwd)) score++;
                if (/[0-9]/.test(pwd)) score++;
                if (/[^a-zA-Z0-9]/.test(pwd)) score += 2;
                if (score <= 2) bar.classList.add('weak');
                else if (score <= 4) bar.classList.add('medium');
                else if (score <= 6) bar.classList.add('strong');
                else bar.classList.add('very-strong');
            }

            // ==================== EVENT LISTENERS ====================
            document.getElementById('unlockBtn').addEventListener('click', async () => {
                const pwd = document.getElementById('masterPassword').value;
                if (!pwd) return alert('Enter master password');
                const stored = loadFromStorage();
                if (!stored) {
                    // First time setup
                    await initializeVault(pwd);
                    isUnlocked = true;
                    masterKey = await deriveKey(pwd, storageSalt);
                } else {
                    const success = await unlockVault(pwd);
                    if (!success) return alert('Incorrect master password');
                    isUnlocked = true;
                }
                unlockSection.style.display = 'none';
                vaultSection.style.display = 'block';
                lockStatus.innerHTML = '<span>🔓</span> Unlocked';
                renderPasswordList();
                document.getElementById('masterPassword').value = '';
            });

            document.getElementById('lockNowBtn').addEventListener('click', lockVault);
            document.getElementById('addNewBtn').addEventListener('click', showAddForm);
            document.getElementById('cancelEntryBtn').addEventListener('click', () => addEditSection.style.display = 'none');
            document.getElementById('saveEntryBtn').addEventListener('click', saveEntry);
            document.getElementById('generatePwBtn').addEventListener('click', generatePassword);
            document.getElementById('entryPassword').addEventListener('input', (e) => updateStrengthMeter(e.target.value));

            // Export
            document.getElementById('exportBtn').addEventListener('click', () => {
                const data = localStorage.getItem('ciphervault_data');
                const salt = localStorage.getItem('ciphervault_salt');
                const blob = new Blob([JSON.stringify({salt, data})], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'ciphervault_backup.json'; a.click();
            });

            // Import
            document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
            document.getElementById('importFile').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const text = await file.text();
                const imported = JSON.parse(text);
                localStorage.setItem('ciphervault_salt', imported.salt);
                localStorage.setItem('ciphervault_data', imported.data);
                alert('Backup imported. Please unlock with your master password.');
                location.reload();
            });

            // Check if vault exists
            if (localStorage.getItem('ciphervault_data')) {
                // Already initialized
            }
        })();
    </script>
</body>
</html>
